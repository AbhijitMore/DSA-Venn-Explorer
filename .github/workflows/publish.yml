name: Build and Publish Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html index.js index.css data.js _site/

      - name: Publish built site to public Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: AbhijitMore/DSA-Venn-Explorer
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: Deploy site
